/*
 * This file was generated by the Gradle 'init' task.
*/

plugins {
    id 'java-library'
    id 'maven-publish'
    id "org.hidetake.ssh" version "2.11.2"
    id 'war'
}

repositories {
    mavenLocal()
    maven {
        url = uri('https://maven.google.com')
    }
    maven {
        url = uri('https://repo.maven.apache.org/maven2/')
    }
}

dependencies {
    // Standard Dependency Format: 'group:artifact:version'
    api 'jakarta.servlet.jsp.jstl:jakarta.servlet.jsp.jstl-api:3.0.0'
    api 'org.glassfish.web:jakarta.servlet.jsp.jstl:3.0.1'
    api 'com.mysql:mysql-connector-j:8.3.0' // Note: Updated to the modern MySQL artifact name
    api 'org.jdbi:jdbi3-core:3.45.1'
    api 'com.google.code.gson:gson:2.10.1'
    api 'org.eclipse.angus:angus-mail:2.0.3'
    api 'commons-codec:commons-codec:1.16.1'
    api 'com.google.guava:guava:33.1.0-jre'
    api 'com.google.oauth-client:google-oauth-client:1.35.0'
    api 'com.google.api-client:google-api-client:2.4.0'
    api 'com.google.auth:google-auth-library-oauth2-http:1.23.0'
    api 'com.google.apis:google-api-services-oauth2:v2-rev157-1.25.0'
    api 'com.github.scribejava:scribejava-core:8.3.3'
    api 'com.fasterxml.jackson.core:jackson-core:2.17.0'
    api 'com.fasterxml.jackson.core:jackson-databind:2.17.0'
    api 'com.fasterxml.jackson.core:jackson-annotations:2.17.0'
    api 'org.apache.httpcomponents:httpclient:4.5.14'
    api 'com.google.http-client:google-http-client-gson:1.44.1'
    api 'org.slf4j:slf4j-api:2.0.12'
    api 'ch.qos.logback:logback-classic:1.5.3'

    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.10.2'
    testImplementation 'org.junit.jupiter:junit-jupiter-engine:5.10.2'

    providedCompile 'jakarta.servlet:jakarta.servlet-api:6.0.0'
}

group = 'vn.edu.hcmuaf.fit'
version = '1.0-SNAPSHOT'
description = 'Web_ban_do_hand_made'
java.sourceCompatibility = JavaVersion.VERSION_21

publishing {
    publications {
        maven(MavenPublication) {
            from(components.java)
        }
    }
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

tasks.withType(Javadoc) {
    options.encoding = 'UTF-8'
}

apply plugin: 'org.hidetake.ssh'

remotes {
    host {
        host = '10.50.154.232'
        user = 'root'
        password = '123456'
    }
}

ssh.settings {
    knownHosts = allowAnyHosts
}

task docker_app_start {
    doLast {
        println 'begin docker_app_start'
        project.ssh.run {
            session(remotes.host) {
                execute 'docker stop tomcat10', ignoreError: true
                execute 'docker rm tomcat10', ignoreError: true
                execute 'docker run -it --rm -d ' +
                        '--name tomcat10 ' +
                        '-v /usr/deploy:/usr/local/tomcat/webapps ' +
                        '-p 80:8080 ' +
                        'tomcat:10.1&'
            }
        }
    }
}

task docker_upload_file_to_server {
    doLast {
        println 'begin docker_upload_file_to_server'
        project.ssh.run {
            session(remotes.host) {
                remove '/usr/deploy/app.war'
                remove '/usr/deploy/app/'
                put from: "${project.projectDir}/build/libs/Web_ban_hang-1.0-SNAPSHOT.war",
                        into: "/usr/deploy/app.war"
            }
        }
    }
}

task docker_deploy {
    dependsOn build
    dependsOn docker_upload_file_to_server
    dependsOn docker_app_start
    tasks.getByName('docker_upload_file_to_server').mustRunAfter build
    tasks.getByName('docker_app_start').mustRunAfter docker_upload_file_to_server
}